    <script>
        function toggleMenu() {
            var menu = document.getElementById("dropdown-menu");
            menu.style.display = (menu.style.display === "block") ? "none" : "block";
        }
        window.onclick = function(event) {
            if (!event.target.matches('.menu-btn')) {
                var dropdowns = document.getElementsByClassName("dropdown");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.style.display === "block") {
                        openDropdown.style.display = "none";
                    }
                }
            }
        }
    </script>

      <script>
          function selectMarkup(button, value) {
              // First, remove active class from all buttons in this group
              const buttonGroup = button.parentElement;
              const buttons = buttonGroup.getElementsByClassName('markup-button');
              for (let i = 0; i < buttons.length; i++) {
                  buttons[i].classList.remove('active');
              }
              
              // Add active class to clicked button
              button.classList.add('active');
              
              // Find the mark up input field and set its value
              const row = buttonGroup.closest('tr').previousElementSibling;
              const cell = buttonGroup.closest('td');
              const cellIndex = Array.from(row.cells).indexOf(cell);
              const markupInput = row.cells[cellIndex].querySelectorAll('input')[1];
              
              if (value === 0) {
                  markupInput.value = "NM";
              } else {
                  markupInput.value = value + "%";
              }
          }
      </script>
